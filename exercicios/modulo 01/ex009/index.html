<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias HTML 5</title>
</head>
<body>
    <h1>Imagens adaptaveis</h1>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/ps2-log.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/ps3-log.png" type="image/png">
        <img src="imagens/xbox-360-logo.png" alt="imagens flexível">
    </picture>
    
</body>
</html>
