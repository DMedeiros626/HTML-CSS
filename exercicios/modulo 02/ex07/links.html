<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /* 
           # = id
           . = class
           : = pseudo-class
           :: = pseudo-element
           > = cildren (filho) 
        */
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }
        a:visited {
            /*aqui decoramos o link visitado*/
            color: darkred;
        }
        a:hover{
            /*aqui atribuimos outras personalizações ao link, como fazer o sublinhado aparecer apenas quando passamos o mouse por cima dele*/
            text-decoration: underline;
            color: black;

        }
        .especial {
            background-color: darkred;
            color: white;
        }
        .especial::after {
            content: '⇐';

        }
        .especial::before {
            content: '⇒';
        }
        h1:hover {
            /*hover é otimo para animar pseudos elementos*/
            color: aqua;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css/tree/master">Repositorio GitHub</a></li>
        <li><a href="https://www.youtube.com/@cursoemvideo" class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com/">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
