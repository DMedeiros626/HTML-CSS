<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixa</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
           border-radius: 10px;
           padding: 10px;
           margin: auto;
        }
        a {
            text-decoration: none;
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Exemplos de caixas box-level</h1>
    <p>Paragrafos tambem são exemplos de caixa box-leve, mas os <a href="#">Links são exemplos de box inline-level</a> vamos ver como tudo isso funciona</p>
</body>
</html>
