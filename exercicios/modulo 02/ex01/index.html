<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de CSS inline</title>
</head>
<body>
    <h1 style="color: navy; font-size: 24px;"> Titulo com CSS inline</h1>
    <p style="color: green; font-weight: bold;">Este paragrafo é estilizado diretamente no elemento</p>
    <div style="padding: 20px; border: 1px solid black;">
        Esta div possui um padding e uma borda definidos inline.
    </div>
    
</body>
</html>
