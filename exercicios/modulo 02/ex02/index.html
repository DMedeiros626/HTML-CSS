<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de CSS interno</title>
    <style>
        body {
            background-color: #f0f0f0;
        }
        h1 {
            color: darkblue; text-align: center;
        }
        p {
            color: darkgreen; font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo</h1>
    <p>Este é um exemplo de CSS interno. Os estilos são definidos dentro da tag "style" no cabeçalho da página.</p>
    <p>O CSS interno é prático para estilizações rápidas e específicas de uma página, mas não é recomendado para projetos maiores ou que requerem reutilização de estilos.</p>
</body>
</html>
